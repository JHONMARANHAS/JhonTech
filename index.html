<!DOCTYPE html>
<html lang="pt-BR">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jhon Tech</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@tailwindcss/forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Orbitron', sans-serif;
    }
    header, section, footer {
      backdrop-filter: blur(12px);
    }
    .neon-text {
      text-shadow: 0 0 5px #0ff, 0 0 10px #0ff, 0 0 20px #00f6ff;
    }
    .glass {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .glass:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
    }
    [data-animate] {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s ease-out;
    }
    [data-animate].visible {
      opacity: 1;
      transform: translateY(0);
    }
    .btn-glow:hover {S
      box-shadow: 0 0 15px #0ff, 0 0 30px #0ff;
    }
    .fade-in {
      animation: fadeIn 1.2s ease-in-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-black to-gray-800 text-gray-100">
  <!-- Header -->
  <header class="fixed top-0 left-0 w-full glass z-50 border-b border-cyan-400/40 fade-in">

      <!-- LOGO + NOME -->
      <div class="flex items-center space-x-3">

        <div class="text-2xl font-bold text-cyan-400 neon-text">Jhon Tech</div>
      </div>

      <nav class="hidden md:flex space-x-6">
        <a href="#planos" class="hover:text-cyan-400 transition">Planos</a>
        <a href="#canais" class="hover:text-cyan-400 transition">Canais</a>
        <a href="#como-funciona" class="hover:text-cyan-400 transition">Como Funciona</a>
        <a href="#depoimentos" class="hover:text-cyan-400 transition">Depoimentos</a>
        <a href="#faq" class="hover:text-cyan-400 transition">FAQ</a>
        <a href="#contato" class="hover:text-cyan-400 transition">Contato</a>
      </nav>

      <a href="https://wa.me/5598981797139" target="_blank" class="hidden md:inline bg-gradient-to-r from-cyan-500 to-blue-600 text-white px-4 py-2 rounded-xl shadow hover:opacity-80 transition-transform hover:scale-105 btn-glow">WhatsApp</a>
      <button id="menuBtn" class="md:hidden text-2xl text-cyan-400">☰</button>
    </div>

    <div id="mobileMenu" class="hidden md:hidden glass border-t border-cyan-400/40">
      <a href="#planos" class="block px-4 py-2">Planos</a>
      <a href="#canais" class="block px-4 py-2">Canais</a>
      <a href="#como-funciona" class="block px-4 py-2">Como Funciona</a>
      <a href="#depoimentos" class="block px-4 py-2">Depoimentos</a>
      <a href="#faq" class="block px-4 py-2">FAQ</a>
      <a href="#contato" class="block px-4 py-2">Contato</a>
      <a href="https://wa.me/5598981797139" target="_blank" class="block px-4 py-2 text-cyan-400">WhatsApp</a>
    </div>
  </header>

  <!-- RESTANTE DO SEU CÓDIGO CONTINUA IGUAL -->
</body>
</html>
